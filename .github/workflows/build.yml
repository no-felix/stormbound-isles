# Automatically build the project and run any configured tests for every push
# and submitted pull request. This includes caching to speed up repeated runs.
name: build
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Gradle dependencies and wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          # Use a key that changes when your Gradle build files change
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties','**/settings.gradle*','**/settings.gradle.kts','gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        # Place GRADLE_USER_HOME inside the workspace (cached above as .gradle)
        run: ./gradlew build --no-daemon --parallel
        env:
          GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/
